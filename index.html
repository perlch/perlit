<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>perlit</title>
<style>
    :root {
        --bg: #020205;
        --fg: #ffffff;
        --accent: #bc13fe;
        --card-bg: rgba(255, 255, 255, 0.03);
    }

    body {
        margin: 0;
        background: var(--bg);
        font-family: "Syncopate", "Inter", sans-serif;
        color: var(--fg);
        overflow-x: hidden;
        min-height: 100vh;
    }

    .space {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, #1a0b2e 0%, #020205 100%);
        overflow: hidden;
    }

    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.5;
        animation: fly linear infinite;
    }

    @keyframes fly {
        from { transform: translateZ(0) scale(1); }
        to { transform: translateZ(1000px) scale(2); opacity: 0; }
    }

    header {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 30px;
        display: flex;
        justify-content: space-between;
        box-sizing: border-box;
        z-index: 100;
        text-transform: uppercase;
        letter-spacing: 4px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .logo { font-weight: 800; cursor: default; }
    .link { cursor: pointer; border-bottom: 1px solid var(--accent); transition: 0.3s; }
    .link:hover { text-shadow: 0 0 10px var(--accent); border-color: white; }

    .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 0 20px;
    }

    .arrow-down {
        margin-top: 40px;
        width: 20px;
        height: 20px;
        border-right: 2px solid var(--accent);
        border-bottom: 2px solid var(--accent);
        transform: rotate(45deg);
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); }
        40% { transform: translateY(-10px) rotate(45deg); }
        60% { transform: translateY(-5px) rotate(45deg); }
    }

    .container {
        padding: 60px 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .grid {
        display: grid;
        gap: 25px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
        position: relative;
        height: 160px;
        background: var(--card-bg);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
        opacity: 0;
        transform: scale(0.5) translateY(100px);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border 0.3s, box-shadow 0.3s;
    }

    .card.reveal {
        opacity: 1;
        transform: scale(1) translateY(0);
        animation: slam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hero .card {
        width: 100%;
        max-width: 320px;
        height: 180px;
    }

    @keyframes slam {
        0% { transform: scale(2); opacity: 0; }
        70% { transform: scale(0.95); }
        100% { transform: scale(1); opacity: 1; }
    }

    .card:hover {
        border-color: var(--accent);
        box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
        z-index: 2;
    }

    .card-img {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0.4;
        transition: 0.5s;
    }

    .card:hover .card-img {
        opacity: 0.8;
        transform: scale(1.1);
    }

    .card-content {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        background: linear-gradient(transparent, rgba(0,0,0,0.9));
        box-sizing: border-box;
    }

    .card-content span {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    @media (max-width: 768px) {
        header { 
            padding: 20px; 
            font-size: 0.65rem; 
            letter-spacing: 2px;
        }
        .grid { 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 15px;
        }
        .hero .card {
            max-width: 280px;
        }
        .container {
            padding: 40px 15px;
        }
    }

    @media (max-width: 480px) {
        .grid { 
            grid-template-columns: 1fr; 
        }
        .logo { font-size: 0.6rem; }
        .link { font-size: 0.6rem; }
    }
</style>
</head>
<body>

<div class="space" id="space"></div>

<header>
    <div class="logo">perlch portfolio</div>
    <div class="link" onclick="window.open('https://github.com/perlch', '_blank')">Access Github</div>
</header>

<section class="hero">
    <div class="card reveal" onclick="window.open('https://github.com/perlch', '_blank')">
        <div class="card-img" style="background-image: url('https://avatars.githubusercontent.com/u/190875022?v=4'); opacity: 0.8;"></div>
        <div class="card-content">
            <span>this is perlch</span>
        </div>
    </div>
    <div class="arrow-down"></div>
</section>

<div class="container">
    <div class="grid" id="projectGrid"></div>
</div>

<script>
    const projects = [
        { name: "dyfusion ai", url: "https://perlch.github.io/dyfusion/", img: "https://github.com/user-attachments/assets/f1ce35c3-560e-40d4-99b8-c7551903670a" },
        { name: "pHTML", url: "https://perlch.github.io/phtml", img: "https://github.com/user-attachments/assets/580ac2e4-f559-4f09-b86b-6f2650e23234" },
        { name: "pnote", url: "https://perlch.github.io/pnote", img: "https://github.com/user-attachments/assets/968932f7-d55e-49c0-a926-f46a7fde54f9" },
        
        { name: "texasholdem", url: "https://perlch.github.io/texasholdem", img: "https://github.com/user-attachments/assets/2a0ac34e-35f1-4a98-835a-f35befef87a7" },
        { name: "matrix", url: "https://perlch.github.io/matrix/", img: "https://github.com/user-attachments/assets/d81ab11f-4341-4c42-8f71-fccfb4eb6292" },
        { name: "RadarOne", url: "https://radarone.online", img: "https://github.com/user-attachments/assets/5afaf9af-2592-44c5-8132-a0fb8996e29f" },
        { name: "Widget-Time", url: "https://perlch.github.io/Widget-Time/", img: "https://github.com/user-attachments/assets/853fd572-61da-486a-b9ed-7727d18ac461" },
        { name: "wbwave", url: "https://perlch.github.io/wbwave", img: "https://github.com/user-attachments/assets/7e76e165-52e0-48ba-b414-646dd6e7a6ac" },
        { name: "mp3 to webm", url: "https://perlch.github.io/mp3webm", img: "https://private-user-images.githubusercontent.com/190875022/568305413-f4d7280d-1ca5-4e47-bdca-8c1e38afff1f.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmF3LmdpdGh1YnVzZXJjb250ZW50LmNvbSIsImtleSI6ImtleTUiLCJleHAiOjE3NzQzNTAzNTMsIm5iZiI6MTc3NDM1MDA1MywicGF0aCI6Ii8xOTA4NzUwMjIvNTY4MzA1NDEzLWY0ZDcyODBkLTFjYTUtNGU0Ny1iZGNhLThjMWUzOGFmZmYxZi5wbmc_WC1BbXotQWxnb3JpdGhtPUFXUzQtSE1BQy1TSEEyNTYmWC1BbXotQ3JlZGVudGlhbD1BS0lBVkNPRFlMU0E1M1BRSzRaQSUyRjIwMjYwMzI0JTJGdXMtZWFzdC0xJTJGczMlMkZhd3M0X3JlcXVlc3QmWC1BbXotRGF0ZT0yMDI2MDMyNFQxMTAwNTNaJlgtQW16LUV4cGlyZXM9MzAwJlgtQW16LVNpZ25hdHVyZT1jMDBiNDhmNzYwZWZiMmYxYjRjNmQyNWFhZDAxYzJhYWExNzY4OWM2MmUxMDI2MDVjMmQxZjM0OTk1YWJkNDgxJlgtQW16LVNpZ25lZEhlYWRlcnM9aG9zdCJ9.0qj_9H1cUrfU70NYzRAM7-HGcCgXlFeZ9IyR9gozH1g" },
        { name: "primenum (game)", url: "https://perlch.github.io/primenum/", img: "https://github.com/user-attachments/assets/64a3afb6-4ca7-4a60-a9f9-4ee96c2d7165" },
        { name: "simpleflower", url: "https://perlch.github.io/simpleflower", img: "https://github.com/user-attachments/assets/09820a92-5bab-4b49-9c34-b0ee95bad963" },
        { name: "perlit / cub8t (youtube)", url: "https://youtube.com/@cub8t", img: "https://yt3.googleusercontent.com/2RDOU0f-EhJkw7Jjb6GSEqZzrZxT3H-tO0hATFsEOvGpor8UuE84-mAetXNYK49gtOjtPgb3QQ=w1707-fcrop64=1,00005a57ffffa5a8-k-c0xffffffff-no-nd-rj" },
        { name: "northern void (youtube)", url: "https://youtube.com/@NORTHERNVOID1337", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdzhwV_IAFrjzEDVpU1f_b5b5PwD6yIk7qIw&s" }
    ];

    const space = document.getElementById('space');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.width = star.style.height = `${Math.random() * 2 + 1}px`;
        star.style.animationDuration = `${Math.random() * 3 + 2}s`;
        star.style.animationDelay = `-${Math.random() * 5}s`;
        space.appendChild(star);
    }

    const grid = document.getElementById("projectGrid");
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('reveal');
            }
        });
    }, { threshold: 0.1 });

    projects.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => window.open(p.url, "_blank");

        const img = document.createElement("div");
        img.className = "card-img";
        if(p.img) img.style.backgroundImage = `url(${p.img})`;

        const content = document.createElement("div");
        content.className = "card-content";
        const title = document.createElement("span");
        title.textContent = p.name;

        content.appendChild(title);
        card.appendChild(img);
        card.appendChild(content);
        grid.appendChild(card);
        
        observer.observe(card);
    });
</script>

</body>
</html>
