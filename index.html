<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta title="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perlch Hub (Portfolio)</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --transition-speed: 1.2s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .logo {
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .github-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .github-link:hover {
            opacity: 1;
        }

        main {
            padding: 10rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 12rem;
        }

        h2 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .current-project .glass-card {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            min-height: 550px;
        }

        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-info {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .project-info h3 {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.9rem 2.2rem;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            text-decoration: none;
            width: fit-content;
            transition: 0.4s;
            border-radius: 100px;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: var(--text-main);
            color: #000;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2.5rem;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 2rem;
            padding-bottom: 3rem;
            scrollbar-width: none;
        }

        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        .media-item {
            min-width: 450px;
        }

        @media (max-width: 1024px) {
            .current-project .glass-card { grid-template-columns: 1fr; }
            .grid-layout { grid-template-columns: 1fr; }
            .media-item { min-width: 85vw; }
            .project-info { padding: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">perlch</div>
        <a href="https://github.com" target="_blank" class="github-link">GITHUB</a>
    </header>

    <main id="portfolio-content"></main>

    <script>
        const DATABASE = {
            currentProject: {
                title: "DYFUSION AI",
                img: "https://github.com/user-attachments/assets/f1ce35c3-560e-40d4-99b8-c7551903670a",
                link: "https://perlch.github.io/dyfusion/",
                color: "#0a0a0a"
            },
            aiDevelopment: {
                title: "DYFUSION AI",
                img: "https://github.com/user-attachments/assets/f1ce35c3-560e-40d4-99b8-c7551903670a",
                link: "https://perlch.github.io/dyfusion/",
                color: "#0d1b2a"
            },
            mobileDevelopment: {
                title: "STATING MOBILE The Game",
                img: "https://github.com/user-attachments/assets/07b2acbb-c20d-4628-a91c-3c99813ade04",
                link: "https://perlch.github.io/stating",
                title2: "My First Mobile Project",
                img2: "https://github.com/user-attachments/assets/7c7f4039-b214-469e-945a-2ae73c24166d",
                link2: "https://github.com/perlch/myApp-veryfirst",
                color: "#1b1b1b"
            },
            media: [
                { title: "PERLIT", img: "https://github.com/user-attachments/assets/1dee9a74-a656-4a83-81b6-1ad75027eb8d", link: "https://youtube.com/post/UgkxXpc40siwUVNhU_-BL9HwVSbGcy0hwzWS", color: "#2d3436" },
                { title: "northernvoid", img: "https://github.com/user-attachments/assets/4597640e-f410-4ba7-9248-9dc629c7df18", link: "https://youtube.com/post/UgkxXpc40siwUVNhU_-BL9HwVSbGcy0hwzWS", color: "#2d3436" }
            ],
            otherProjects: [
                { title: "RadarOne (team-work)", img: "https://github.com/user-attachments/assets/5afaf9af-2592-44c5-8132-a0fb8996e29f", link: "https://radarone.online", color: "#1a1a2e" },
                
                { title: "pHTML", link: "https://perlch.github.io/phtml", img: "https://github.com/user-attachments/assets/580ac2e4-f559-4f09-b86b-6f2650e23234" },
                { title: "pnote", link: "https://perlch.github.io/pnote", img: "https://github.com/user-attachments/assets/968932f7-d55e-49c0-a926-f46a7fde54f9" },
                
                { title: "texasholdem", link: "https://perlch.github.io/texasholdem", img: "https://github.com/user-attachments/assets/2a0ac34e-35f1-4a98-835a-f35befef87a7" },
                { title: "matrix", link: "https://perlch.github.io/matrix/", img: "https://github.com/user-attachments/assets/d81ab11f-4341-4c42-8f71-fccfb4eb6292" },
                { title: "Widget-Time", link: "https://perlch.github.io/Widget-Time/", img: "https://github.com/user-attachments/assets/853fd572-61da-486a-b9ed-7727d18ac461" },
                { title: "wbwave", link: "https://perlch.github.io/wbwave", img: "https://github.com/user-attachments/assets/7e76e165-52e0-48ba-b414-646dd6e7a6ac" },
                { title: "mp3 to webm", link: "https://perlch.github.io/mp3webm", img: "https://github.com/user-attachments/assets/218651c6-b694-492b-84cf-9a3bb953e676" },
                { title: "primenum (game)", link: "https://perlch.github.io/primenum/", img: "https://github.com/user-attachments/assets/64a3afb6-4ca7-4a60-a9f9-4ee96c2d7165" },
                { title: "simpleflower", link: "https://perlch.github.io/simpleflower", img: "https://github.com/user-attachments/assets/09820a92-5bab-4b49-9c34-b0ee95bad963" },
                   
            ]
        };

        function render() {
            const container = document.getElementById('portfolio-content');
            container.innerHTML = `
                <section class="current-project" data-color="${DATABASE.currentProject.color}">
                    <h2>Current Project</h2>
                    <div class="glass-card">
                        <img src="${DATABASE.currentProject.img}" class="project-image">
                        <div class="project-info">
                            <h3>${DATABASE.currentProject.title}</h3>
                            <a href="${DATABASE.currentProject.link}" target="_blank" class="btn">VIEW PROJECT</a>
                        </div>
                    </div>
                </section>

                <section data-color="${DATABASE.aiDevelopment.color}">
                    <h2>AI Development</h2>
                    <div class="glass-card">
                        <div style="display: grid; grid-template-columns: 1fr 1fr;">
                            <img src="${DATABASE.aiDevelopment.img}" class="project-image">
                            <div class="project-info">
                                <h3>${DATABASE.aiDevelopment.title}</h3>
                                <a href="${DATABASE.aiDevelopment.link}" target="_blank" class="btn">VIEW</a>
                            </div>
                        </div>
                    </div>
                </section>

                <section data-color="${DATABASE.mobileDevelopment.color}">
                    <h2>Mobile Development</h2>
                    <div class="glass-card">
                        <div style="display: grid; grid-template-columns: 1fr 1fr;">
                            <img src="${DATABASE.mobileDevelopment.img}" class="project-image">
                            <div class="project-info">
                                <h3>${DATABASE.mobileDevelopment.title}</h3>
                                <a href="${DATABASE.mobileDevelopment.link}" target="_blank" class="btn">VIEW</a>
                            </div>
                        </div> <!--<br>
                        <div style="display: grid; grid-template-columns: 1fr 1fr;">
                            <img src="${DATABASE.mobileDevelopment.img2}" class="project-image">
                            <div class="project-info">
                                <h3>${DATABASE.mobileDevelopment.title2}</h3>
                                <a href="${DATABASE.mobileDevelopment.link2}" target="_blank" class="btn">VIEW</a>
                            </div>
                        </div>-->
                    </div>
                </section>

                <section>
                    <h2>Media / Music / Video</h2>
                    <div class="horizontal-scroll">
                        ${DATABASE.media.map(m => `
                            <div class="glass-card media-item" data-color="${m.color}">

                                <div class="project-info">
                                    <h3>${m.title}</h3>
                                    <a href="${m.link}" target="_blank" class="btn">WATCH / LISTEN</a>
                                </div>
                                <img src="${m.img}" class="project-image">
                                
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section>
                    <h2>Other Projects</h2>
                    <div class="grid-layout">
                        ${DATABASE.otherProjects.map(p => `
                            <div class="glass-card" data-color="${p.color}">

                                <div class="project-info">
                                    <h3>${p.title}</h3>
                                    <a href="${p.link}" target="_blank" class="btn">DISCOVER</a>
                                </div>
                                <img src="${p.img}" class="project-image">
                                
                            </div>
                        `).join('')}
                    </div>
                </section>

                
            `;
        }

        function initInteractivity() {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const rotateX = (y - rect.height / 2) / 80; 
                    const rotateY = (rect.width / 2 - x) / 80;
                    card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.01, 1.01, 1.01)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1200px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                });
            });

            window.addEventListener('scroll', () => {
                const sections = document.querySelectorAll('[data-color]');
                sections.forEach(sec => {
                    const rect = sec.getBoundingClientRect();
                    if (rect.top < window.innerHeight * 0.5) {
                        document.body.style.backgroundColor = sec.getAttribute('data-color');
                    }
                });
            });
        }

        render();
        initInteractivity();



    </script>
</body>
</html>
